<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ForFX — Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--purple:#6750A4;--purple-light:#f3f0fa;--purple-dark:#4f3d8a;--success:#2e7d32;--error:#c62828;--text:#1a1a2e;--muted:#6b7280;--border:#e5e0f0;--white:#ffffff;--bg:#f8f6fc;--shadow:0 4px 24px rgba(103,80,164,0.10);--radius:14px;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
    body::before{content:'';position:fixed;top:-120px;left:-120px;width:420px;height:420px;background:radial-gradient(circle,rgba(103,80,164,0.13) 0%,transparent 70%);border-radius:50%;pointer-events:none;}
    body::after{content:'';position:fixed;bottom:-100px;right:-100px;width:380px;height:380px;background:radial-gradient(circle,rgba(156,39,176,0.10) 0%,transparent 70%);border-radius:50%;pointer-events:none;}
    .page{width:100%;max-width:440px;padding:24px 16px;position:relative;z-index:1;animation:fadeUp 0.5s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:32px;}
    .brand-icon{width:44px;height:44px;background:var(--purple);border-radius:12px;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:18px;}
    .brand-text h1{font-size:20px;font-weight:700;color:var(--text);}
    .brand-text p{font-size:13px;color:var(--muted);}
    .card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:36px;border:1px solid var(--border);}
    .step{display:none;flex-direction:column;gap:18px;}
    .step.active{display:flex;animation:fadeIn 0.3s ease both;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .step-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.4px;}
    .step-sub{font-size:13px;color:var(--muted);}
    .field{display:flex;flex-direction:column;gap:6px;}
    .field label{font-size:13px;font-weight:500;color:var(--text);}
    .input-wrap{position:relative;display:flex;align-items:center;}
    .input-wrap input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--white);outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
    .input-wrap input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(103,80,164,0.10);}
    .input-wrap input.has-eye{padding-right:40px;}
    .eye-btn{position:absolute;right:12px;background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;display:flex;align-items:center;}
    .eye-btn:hover{color:var(--purple);}
    .field-error{font-size:12px;color:var(--error);display:none;align-items:center;gap:4px;}
    .field-error.show{display:flex;}
    .alert{padding:11px 14px;border-radius:9px;font-size:13px;font-weight:500;display:none;align-items:center;gap:8px;}
    .alert.show{display:flex;}
    .alert.success{background:#e8f5e9;color:var(--success);border:1px solid #a5d6a7;}
    .alert.error{background:#ffebee;color:var(--error);border:1px solid #ef9a9a;}
    .btn-submit{width:100%;padding:13px;background:var(--purple);color:white;border:none;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:background 0.2s;text-align:center;text-decoration:none;display:block;}
    .btn-submit:hover{background:var(--purple-dark);}
    .btn-submit:disabled{opacity:0.7;cursor:not-allowed;}
    .back-link{font-size:13px;color:var(--purple);text-decoration:none;font-weight:500;text-align:center;display:block;}
    .back-link:hover{text-decoration:underline;}
    .success-icon{width:64px;height:64px;background:#e8f5e9;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto;}
  </style>
</head>
<body>
<div class="page">
  <div class="brand">
    <div class="brand-icon">F</div>
    <div class="brand-text"><h1>ForFX</h1><p>Sales & Support Portal</p></div>
  </div>
  <div class="card">
    <!-- STEP 1 -->
    <div class="step active" id="step1">
      <div><div class="step-title">Reset password</div><div class="step-sub">Enter your account email to continue</div></div>
      <div class="alert" id="alert1"></div>
      <div class="field">
        <label>Email address</label>
        <div class="input-wrap"><input type="email" id="email-input" placeholder="you@forfx.com"/></div>
        <div class="field-error" id="email-err"><svg viewBox="0 0 20 20" fill="currentColor" width="13" height="13"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg><span id="email-err-msg">Please enter a valid email</span></div>
      </div>
      <button class="btn-submit" onclick="checkEmail()">Continue</button>
      <a href="login.html" class="back-link">← Back to Sign In</a>
    </div>
    <!-- STEP 2 -->
    <div class="step" id="step2">
      <div><div class="step-title">Set new password</div><div class="step-sub" id="step2-sub">Create a new password for your account</div></div>
      <div class="alert" id="alert2"></div>
      <div class="field">
        <label>New password</label>
        <div class="input-wrap">
          <input type="password" id="new-password" placeholder="Enter new password" class="has-eye"/>

        </div>
        <div class="field-error" id="pw-err"><svg viewBox="0 0 20 20" fill="currentColor" width="13" height="13"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg><span>Password must be at least 8 characters</span></div>
      </div>
      <div class="field">
        <label>Confirm password</label>
        <div class="input-wrap">
          <input type="password" id="confirm-password" placeholder="Repeat new password" class="has-eye"/>
